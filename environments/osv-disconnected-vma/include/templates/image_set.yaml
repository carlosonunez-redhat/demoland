#@ load("@ytt:data", "data")
kind: ImageSetConfiguration
apiVersion: mirror.openshift.io/v2alpha1
mirror:
  platform:
    channels:
    - name: #@ data.values.openshift_channel
      minVersion: #@ data.values.max_version
      maxVersion: #@ data.values.max_version
    graph: true
  operators:
    - catalog: #@ 'registry.redhat.io/redhat/redhat-operator-index:v{}'.format(data.values.openshift_channel.split("-")[1])
      packages:
      - name: multicluster-engine
      - name: ocs-operator
      - name: odf-operator
      - name: mcg-operator
      - name: odf-csi-addons-operator
      - name: odr-cluster-operator
      - name: odr-hub-operator
      - name: lvms-operator
      - name: local-storage-operator
      - name: metallb-operator
      - name: node-healthcheck-operator
      - name: node-maintenance-operator
      - name: fence-agents-remediation
      - name: kubevirt-hyperconverged
      - name: kubernetes-nmstate-operator
      - name: cincinnati-operator
  additionalImages:
   - name: registry.redhat.io/ubi8/ubi:latest
   - name: registry.redhat.io/ubi9/ubi:latest
   - name: registry.redhat.io/ubi10/ubi:latest

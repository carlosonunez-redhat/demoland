namespace: example-apps
resources:
  - ../../../../../components/k8s-namespace
  - ../../../../../apps/example-apps/simple-load-tester
patches:
  - target:
      kind: Namespace
      name: patch-me
    patch: |-
      - op: replace
        path: /metadata/name
        value: example-apps
      - op: add
        path: /metadata/annotations
        value:
          instrumentation.opentelemetry.io/inject-go: "openshift-observability/instrumentation"
  - target:
      kind: BuildConfig
      name: simple-load-tester-web-server
    patch: |-
      - op: replace
        path: /metadata/namespace
        value: example-apps
  - target:
      kind: ImageStream
      name: simple-load-tester-web-server
    patch: |-
      - op: replace
        path: /metadata/namespace
        value: example-apps
  - target:
      kind: Deployment
      name: simple-load-tester-web-server
    patch: |-
      - op: replace
        path: /metadata/namespace
        value: example-apps
      - op: add
        path: /metadata/annotations
        value:
          instrumentation.opentelemetry.io/otel-go-auto-target-exe: '/opt/app-root/gobinary'
  - target:
      kind: Route
      name: simple-load-tester-web-server
    patch: |-
      - op: replace
        path: /spec/host
        value: web-server.apps.rhobsdemo.sandbox5544.opentlc.com
  - target:
      kind: ConfigMap
      name: app-config
    patch: |-
      - op: replace
        path: /metadata/namespace
        value: example-apps
      - op: replace
        path: /data/web_server_host
        value: simple-load-tester-web-server.example-apps

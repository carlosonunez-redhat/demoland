namespace: example-apps
resources:
  - ../../../../components/k8s-namespace
  - ../../../../apps/example-apps/simple-load-tester
patches:
  - target:
      kind: Namespace
      name: patch-me
    patch: |-
      - op: replace
        path: /metadata/name
        value: example-apps
  - target:
      kind: BuildConfig
      name: simple-load-tester-web-server
    patch: |-
      - op: replace
        path: /metadata/name
        value: example-apps
  - target:
      kind: Route
      name: simple-load-tester-web-server
    patch: |-
      - op: replace
        path: /spec/host
        value: web-server.$HOSTNAME
  - target:
      kind: ConfigMap
      name: app-config
    patch: |-
      - op: replace
        path: /metadata/namespace
        value: example-apps
      - op: replace
        path: /data/web_server_host
        value: simple-load-tester-web-server.example-apps

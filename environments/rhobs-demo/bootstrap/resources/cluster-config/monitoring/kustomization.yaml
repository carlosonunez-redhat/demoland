resources:
  - ../../../../../../components/openshift-monitoring/resources/cluster-monitoring
patches:
  - target:
      kind: ConfigMap
      name: cluster-monitoring-config
      namespace: openshift-monitoring
    patch: |-
      - op: replace
        path: /data/config.yaml
        value: |-
          promtheusK8s:
            remoteWrite:
            - url: http://otel-collector.openshift-observability.svc.cluster.local:4318/v1/metrics

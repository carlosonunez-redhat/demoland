resources:
- ../../../../../../components/openshift-logging/resources/loki-stack/stack
# automatically updated by 'postinstall'; any changes will be overwritten!
patches:
  - target:
      kind: LokiStack
      name: logging-loki
      namespace: openshift-logging
    patch: |-
      - op: replace
        path: /spec/storageClassName
        value: gp3-csi

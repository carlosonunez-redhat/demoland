resources:
  - ../../../../../../components/cluster-observability-operator/resources/observability-installer
patches:
  - target:
      kind: ObservabilityInstaller
      name: rhobs
      namespace: openshift-observability
    # DO NOT MODIFY THE VALUES BELOW
    # They will be overridden by 'just postinstall.'
    patch: |-
      - op: replace
        path: /spec/capabilities/tracing/storage/objectStorage/s3CCO/bucket
        value: 3qqaxq4w-rhobs-s3-bucket
      - op: replace
        path: /spec/capabilities/tracing/storage/objectStorage/s3CCO/region
        value: us-east-2

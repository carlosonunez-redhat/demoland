environments:
    example:
        version: 20260124
        # alias_of: Alias of an existing environment. Keys defined here will be
        # merged with that of the aliased environment.
        alias_of: ""
        # depends_on: Deploys (and destroys) any environments in this list, in order.
        depends_on: []
        common_options:
            # common_options.ignore_installconfig_check: Ignores checking for an installconfig in this
            # environment.
            ignore_installconfig_check: false
        deploy:
            # environment_vars: Set within the container that provisions/destroys the environment.
            environment_vars:
                - SOME_KEY=some value
                - ANOTHER_KEY=another value
        # these secrets will get mounted into a folder called /secrets within the
        # container that builds your cluster.
        secrets:
            secret_name:
                # name: the name of the file that will contain this secret.
                name: example
                # mode: the file mode to apply onto the secret (MUST be a string)
                mode: "0600"
                # encrypted

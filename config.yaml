environments:
    example:
        version: 20260402
        # alias_of: Alias of an existing environment. Keys defined here will be
        # merged with that of the aliased environment.
        alias_of: ""
        # depends_on: Deploys (and destroys) any environments in this list, in order.
        #
        # EXAMPLE
        #
        # ```yaml
        # depends_on:
        # - ocp-custom-env
        # ```
        depends_on: []
        common_options:
            # common_options.ignore_installconfig_check: Ignores checking for an installconfig in this
            # environment.
            ignore_installconfig_check: false
        deploy:
            # environment_vars: Set within the container that provisions/destroys the environment.
            environment_vars:
                - SOME_KEY=some value
                - ANOTHER_KEY=another value
        # these secrets will get mounted into a folder called /secrets within the
        # container that builds your cluster.
        secrets: {}
        # cloud_credentials: Overrides the default cloud configs set by
        # 'common.cloud_credentials'.
        #
        # EXAMPLE:
        #
        # # STS credentials
        # ```yaml
        # cloud_credentials:
        #   aws:
        #     # encrypted
        #     sts:
        #       aws_access_key_id: AKIA12345...
        #       aws_secret_access_key: superdupersecret
        #       aws_default_region: us-west-1
        #       aws_role_arn: foo
        #       aws_role_external_id: superdupersecret
        # ```
        cloud_credentials:
            aws: {}
        # components: Additional components to install into your cluster.
        # Installed via Kustomize. Customize your components by adding
        # Kustomize YAML files to the 'overlays/[COMPONENT_NAME]' directory
        # within your environment.
        #
        # (See the 'example' environment for more details.)
        #
        # EXAMPLE:
        #
        # ```yaml
        # components:
        # - aap
        # - openshift-gitops
        # - advanced-developer-suite
        # ```
        components:
            - example
    rosa-gitops-agent:
        version: 20260402
        # alias_of: Alias of an existing environment. Keys defined here will be
        # merged with that of the aliased environment.
        alias_of: ""
        # depends_on: Deploys (and destroys) any environments in this list, in order.
        #
        # EXAMPLE
        #
        # ```yaml
        # depends_on:
        # - ocp-custom-env
        # ```
        depends_on:
            - rosa-hcp
        common_options:
            # common_options.ignore_installconfig_check: Ignores checking for an installconfig in this
            # environment.
            ignore_installconfig_check: false
        # these secrets will get mounted into a folder called /secrets within the
        # container that builds your cluster.
        secrets: {}
        # cloud_credentials: Overrides the default cloud configs set by
        # 'common.cloud_credentials'.
        #
        # EXAMPLE:
        #
        # # STS credentials
        # ```yaml
        # cloud_credentials:
        #   aws:
        #     # encrypted
        #     sts:
        #       aws_access_key_id: AKIA12345...
        #       aws_secret_access_key: superdupersecret
        #       aws_default_region: us-west-1
        #       aws_role_arn: foo
        #       aws_role_external_id: superdupersecret
        # ```
        cloud_credentials:
            aws: {}
        # components: Additional components to install into your cluster.
        # Installed via Kustomize. Customize your components by adding
        # Kustomize YAML files to the 'overlays/[COMPONENT_NAME]' directory
        # within your environment.
        #
        # (See the 'example' environment for more details.)
        #
        # EXAMPLE:
        #
        # ```yaml
        # components:
        # - aap
        # - openshift-gitops
        # - advanced-developer-suite
        # ```
        components: []
    rosa-hcp:
        alias_of: rosa
        common_options:
            # common_options.ignore_installconfig_check: Ignores checking for an installconfig in this
            # environment.
            ignore_installconfig_check: true
        deploy:
            cluster_config:
                openshift_version: 4.21.9
            # environment_vars: Set within the container that provisions/destroys the environment.
            environment_vars:
                - ROSA_DISABLE_CLUSTER_TYPE_CLASSIC="true"

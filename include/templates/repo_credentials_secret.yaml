#@ load("@ytt:data", "data")
#@ load("@ytt:base64", "base64")
apiVersion: v1
kind: Secret
metadata:
  name: repo-credentials
  namespace: openshift-gitops
  labels:
    argocd.argoproj.io/secret-type: repository
type: Opaque
stringData:
  type: git
  url: #@ data.values.repo_url
  sshPrivateKey: #@ base64.decode(data.values.ssh_private_key_enc)



